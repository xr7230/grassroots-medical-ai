<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基层医疗AI文书智能体</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#0ea5e9 0%,#0284c7 100%);min-height:100vh;padding:16px}
.container{max-width:800px;margin:0 auto}
.header{text-align:center;color:#fff;margin-bottom:20px}
.header h1{font-size:2rem;margin-bottom:6px}
.header p{opacity:.85;font-size:.95rem}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.15);margin-bottom:16px}
.card h2{font-size:1.1rem;color:#1e293b;margin-bottom:14px}
textarea{width:100%;min-height:120px;padding:14px;border:2px solid #e2e8f0;border-radius:12px;font-size:1rem;font-family:inherit;resize:vertical;line-height:1.6}
textarea:focus{outline:none;border-color:#0ea5e9;box-shadow:0 0 0 4px rgba(14,165,233,.1)}
.type-row{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.type-btn{padding:8px 18px;border:2px solid #e2e8f0;background:#fff;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:500;color:#64748b}
.type-btn.active{background:#0ea5e9;color:#fff;border-color:#0ea5e9}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#0ea5e9 0%,#0284c7 100%);color:#fff;transition:all .3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(14,165,233,.4)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-sm{padding:6px 14px;font-size:.85rem;border-radius:8px}
.btn-outline{border:2px solid #0ea5e9;background:#fff;color:#0ea5e9}
.btn-outline:hover{background:#f0f9ff;box-shadow:none;transform:none}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px}
.output{background:#f8fafc;border-radius:10px;padding:20px;font-size:.92rem;line-height:1.8;white-space:pre-wrap;color:#334155;min-height:60px;display:none}
.label{font-weight:600;color:#0ea5e9;margin:14px 0 6px;font-size:.9rem}
.key-row{display:flex;gap:10px;align-items:center}
.key-row input{flex:1;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:.9rem}
.key-row input:focus{outline:none;border-color:#0ea5e9}
.hint{font-size:.8rem;color:#94a3b8;margin-top:6px}
.hint a{color:#0ea5e9}
.badge{display:inline-block;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:12px;font-size:.8rem}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 24px;border-radius:10px;font-size:.9rem;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
.disclaimer{font-size:.82rem;color:#94a3b8;text-align:center;margin-top:16px}
.loading{display:none;text-align:center;padding:20px;color:#64748b}
.loading.show{display:block}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid #e2e8f0;border-top-color:#0ea5e9;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🏥 基层医疗AI文书智能体</h1>
<p>对话 → 病历 · 安静后台助手 · 诊断给方向不给定论</p>
<span class="badge">v3.0 · 入院记录 · 出院小结 · 随访记录</span>
</div>

<div class="card">
<h2>🔑 DeepSeek API Key</h2>
<div class="key-row">
<input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off">
<button class="btn btn-sm" onclick="saveKey()">保存</button>
<button class="btn btn-sm btn-outline" onclick="clearKey()">清除</button>
</div>
<div class="hint">Key 仅存本地浏览器，不上传任何服务器 · <a href="https://platform.deepseek.com/api_keys" target="_blank">获取 Key</a></div>
</div>

<div class="card">
<h2>📝 输入医患对话或病情描述</h2>
<div class="type-row">
<button class="type-btn active" onclick="setType('admission',this)">📋 入院记录</button>
<button class="type-btn" onclick="setType('discharge',this)">🏥 出院小结</button>
<button class="type-btn" onclick="setType('followup',this)">🩺 随访记录</button>
</div>
<textarea id="inputText" placeholder="例如：患者女28岁腹痛2天右下腹伴恶心。查体右下腹压痛反跳痛阳性。血常规WBC 12.5×10⁹/L。"></textarea>
<div class="toolbar">
<button class="btn" id="genBtn" onclick="generate()">⚡ 生成文书 (Ctrl+Enter)</button>
<button class="btn btn-sm btn-outline" onclick="clearAll()">清空</button>
</div>
</div>

<div id="loading" class="loading"><span class="spinner"></span>正在生成，请稍候...</div>

<div class="card" id="resultCard" style="display:none">
<h2>📄 生成结果</h2>
<div class="output" id="result"></div>
</div>

<p class="disclaimer">⚠️ 本工具为医生辅助参考，不具独立诊断权。所有输出需经医生审阅后使用。</p>
</div>

<div id="toast" class="toast"></div>

<script>
let recordType = 'admission';
const DEEPSEEK_URL = 'https://api.deepseek.com/chat/completions';

function getKey() { return localStorage.getItem('ds_key') || ''; }
function saveKey() { const k = document.getElementById('apiKey').value.trim(); if(k&&!k.startsWith('sk-')){toast('Key应以sk-开头');return;} localStorage.setItem('ds_key',k); toast(k?'Key已保存':'Key已清除'); }
function clearKey() { localStorage.removeItem('ds_key'); document.getElementById('apiKey').value=''; toast('Key已清除'); }

function setType(t,btn){
recordType=t;document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
const p={admission:'例如：患者女28岁腹痛2天右下腹伴恶心。查体右下腹压痛反跳痛阳性。血常规WBC 12.5×10⁹/L。',discharge:'例如：患者男65岁胸闷胸痛3天入院行支架植入术后恢复好。出院带药阿司匹林100mg qd氯吡格雷75mg qd。',followup:'例如：患者女55岁高血压随访服药后血压控制在135/85。口服硝苯地平30mg qd。无头晕头痛。'};
document.getElementById('inputText').placeholder=p[t];
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function clearAll(){document.getElementById('inputText').value='';document.getElementById('resultCard').style.display='none';}

async function generate(){
const key=getKey();if(!key){toast('请先配置API Key');return;}
const text=document.getElementById('inputText').value.trim();if(!text){toast('请输入内容');return;}
document.getElementById('genBtn').disabled=true;
document.getElementById('loading').classList.add('show');
document.getElementById('resultCard').style.display='none';

const prompts={
admission:`你是基层医疗AI文书助手。根据以下医患对话或病情描述，生成入院记录。

格式要求：
【主诉】症状+持续时间（如"腹痛2天"）
【现病史】详细描述发病经过、伴随症状、诊治经过
【既往史】如无则写"未提供"
【体格检查】生命体征及阳性体征
【辅助检查】实验室/影像结果
【初步诊断】最可能的诊断（标注"可能/待排"），最多3个
【治疗计划】进一步检查及治疗建议

原则：
- 信息不足时不编造，标注"待补充"或"未提供"
- 诊断标注"可能/待排"，不声称百分百确诊
- 只生成文书，不要额外解释

输入：${text}`,

discharge:`你是基层医疗AI文书助手。根据以下出院相关信息，生成出院小结。

格式要求：
【入院情况】主诉及入院诊断
【诊疗经过】主要检查及治疗措施
【出院诊断】最终诊断
【出院医嘱】用药方案及注意事项
【随访建议】复查时间及内容

原则：信息不足标注"待补充"，不编造数据。

输入：${text}`,

followup:`你是基层医疗AI文书助手。根据以下随访信息，生成随访记录。

格式要求：
【随访日期】如未提供标注"待补充"
【主诉及症状】当前病情控制情况
【体格检查】血压/血糖等关键指标
【用药评估】用药依从性及不良反应
【生活方式指导】饮食运动建议
【下次随访建议】建议随访时间

原则：信息不足标注"待补充"，不编造数据。

输入：${text}`
};

try{
const r=await fetch(DEEPSEEK_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:'你是基层医疗AI文书助手。只生成医疗文书，不额外解释。信息不足标注"待补充"，诊断标注"可能/待排"。'},{role:'user',content:prompts[recordType]}],temperature:0.3,max_tokens:2048})});
const d=await r.json();
if(d.error){toast('API错误: '+d.error.message);return;}
const out=d.choices[0].message.content;
document.getElementById('result').textContent=out;
document.getElementById('resultCard').style.display='block';
document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
}catch(e){toast('请求失败: '+e.message);}
finally{
document.getElementById('genBtn').disabled=false;
document.getElementById('loading').classList.remove('show');
}
}

document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();generate();}});
document.getElementById('apiKey').value=getKey();
</script>
</body>
</html>
